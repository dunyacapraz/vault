{% extends "base.html" %}
{% block title %}Vault | Hesap Ayarları{% endblock %}
{% block content %}
<div class="min-h-screen">
    <header class="bg-white/90 backdrop-blur-sm sticky top-0 z-20 px-5 sm:px-8 py-5 border-b border-[var(--line)] anim-fade">
        <div class="max-w-xl mx-auto flex items-center gap-3">
            <a href="/" class="btn-press h-10 w-10 rounded-lg flex items-center justify-center text-stone-500 hover:bg-stone-100 hover:text-stone-800 transition-colors shrink-0">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h1 class="font-display text-2xl font-semibold tracking-tight">Hesap Ayarları</h1>
        </div>
    </header>

    <main class="px-5 sm:px-8 py-8 max-w-xl mx-auto">
        <div class="anim-fade-up bg-white border border-[var(--line)] rounded-2xl p-7">
            <div class="flex items-center gap-3 mb-6">
                <div class="h-12 w-12 rounded-full flex items-center justify-center text-white font-bold"
                     style="background-color: {{ user.avatar_color }}">
                    {{ user.name[0] }}
                </div>
                <div>
                    <p class="font-semibold">{{ user.name }}</p>
                    <p class="font-mono text-xs text-stone-400">@{{ user.username }}{% if user.is_admin %} · admin{% endif %}</p>
                </div>
            </div>

            <div id="error-msg" class="hidden bg-red-50 text-red-700 p-3 rounded-lg text-sm mb-4 border border-red-200 anim-scale"></div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-stone-700 mb-1">İsim</label>
                    <input type="text" id="acc-name" value="{{ user.name }}"
                        class="w-full px-3 py-2.5 border border-stone-300 rounded-lg focus:ring-2 focus:ring-[var(--amber)] focus:border-[var(--amber)] outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-stone-700 mb-1">Kullanıcı Adı</label>
                    <input type="text" id="acc-username" value="{{ user.username }}"
                        class="w-full px-3 py-2.5 border border-stone-300 rounded-lg focus:ring-2 focus:ring-[var(--amber)] focus:border-[var(--amber)] outline-none">
                </div>

                <div class="border-t border-[var(--line)] pt-4 mt-2">
                    <p class="text-xs font-semibold text-stone-500 uppercase tracking-wide mb-3">Şifre Değiştir <span class="font-normal text-stone-400 normal-case">(opsiyonel)</span></p>
                    <div>
                        <label class="block text-sm font-semibold text-stone-700 mb-1">Yeni Şifre</label>
                        <input type="password" id="acc-new-password" placeholder="boş bırakırsan değişmez"
                            class="w-full px-3 py-2.5 border border-stone-300 rounded-lg focus:ring-2 focus:ring-[var(--amber)] focus:border-[var(--amber)] outline-none">
                    </div>
                </div>

                <div class="border-t border-[var(--line)] pt-4 mt-2">
                    <label class="block text-sm font-semibold text-stone-700 mb-1">Mevcut Şifre <span class="text-stone-400 font-normal">(onay için gerekli)</span></label>
                    <input type="password" id="acc-current-password" placeholder="değişiklikleri kaydetmek için şifreni gir"
                        class="w-full px-3 py-2.5 border border-stone-300 rounded-lg focus:ring-2 focus:ring-[var(--amber)] focus:border-[var(--amber)] outline-none">
                </div>

                <button id="save-btn" onclick="saveAccount()"
                    class="btn-press w-full fab-amber text-white font-semibold py-3 rounded-lg hover:brightness-105 transition-all shadow-md mt-2 flex items-center justify-center gap-2">
                    <span id="save-btn-text">Kaydet</span>
                </button>
            </div>
        </div>
    </main>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function saveAccount() {
        const name = document.getElementById('acc-name').value.trim();
        const username = document.getElementById('acc-username').value.trim();
        const new_password = document.getElementById('acc-new-password').value;
        const current_password = document.getElementById('acc-current-password').value;
        const errorMsg = document.getElementById('error-msg');
        const btn = document.getElementById('save-btn');
        const btnText = document.getElementById('save-btn-text');

        errorMsg.classList.add('hidden');

        if (!current_password) {
            errorMsg.textContent = 'Değişiklikleri kaydetmek için mevcut şifreni girmelisin.';
            errorMsg.classList.remove('hidden');
            return;
        }

        btn.disabled = true;
        btnText.innerHTML = '<span class="spinner inline-block align-middle"></span>';

        try {
            const res = await fetch('/api/account', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, username, new_password, current_password })
            });
            const data = await res.json().catch(() => ({}));
            if (res.ok) {
                queueToast('Hesap güncellendi', 'success');
                window.location.href = '/';
            } else {
                errorMsg.textContent = data.message || 'Bir hata oluştu';
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btnText.textContent = 'Kaydet';
            }
        } catch (err) {
            errorMsg.textContent = 'Bağlantı hatası, tekrar dene.';
            errorMsg.classList.remove('hidden');
            btn.disabled = false;
            btnText.textContent = 'Kaydet';
        }
    }
</script>
{% endblock %}
