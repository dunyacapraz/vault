<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vault | Ortak Anılar{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #14110f;
            --paper: #fbf7f0;
            --amber: #c2640a;
            --amber-deep: #8a4406;
            --moss: #3f5c47;
            --line: #e7ddcd;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--paper); color: var(--ink); }
        .font-display { font-family: 'Fraunces', serif; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #d8cbb4; border-radius: 999px; }
        ::-webkit-scrollbar-track { background: transparent; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(.94); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(24px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes pinDrop {
            0% { opacity: 0; transform: translateY(-10px) rotate(0deg); }
            60% { opacity: 1; transform: translateY(2px) rotate(var(--tilt, -2deg)); }
            100% { opacity: 1; transform: translateY(0) rotate(var(--tilt, -2deg)); }
        }
        @keyframes shimmer {
            0% { background-position: -400px 0; }
            100% { background-position: 400px 0; }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes pulseRing {
            0% { box-shadow: 0 0 0 0 rgba(194, 100, 10, .35); }
            100% { box-shadow: 0 0 0 14px rgba(194, 100, 10, 0); }
        }

        .anim-fade-up { animation: fadeInUp .55s cubic-bezier(.22,.61,.36,1) both; }
        .anim-fade { animation: fadeIn .4s ease both; }
        .anim-scale { animation: scaleIn .25s cubic-bezier(.22,.61,.36,1) both; }
        .anim-slide { animation: slideInRight .35s cubic-bezier(.22,.61,.36,1) both; }
        .anim-pin { animation: pinDrop .5s cubic-bezier(.22,.61,.36,1) both; }

        .stagger > * { opacity: 0; animation: fadeInUp .55s cubic-bezier(.22,.61,.36,1) both; }
        .stagger > *:nth-child(1) { animation-delay: .03s; }
        .stagger > *:nth-child(2) { animation-delay: .08s; }
        .stagger > *:nth-child(3) { animation-delay: .13s; }
        .stagger > *:nth-child(4) { animation-delay: .18s; }
        .stagger > *:nth-child(5) { animation-delay: .23s; }
        .stagger > *:nth-child(6) { animation-delay: .28s; }
        .stagger > *:nth-child(7) { animation-delay: .33s; }
        .stagger > *:nth-child(8) { animation-delay: .38s; }
        .stagger > *:nth-child(n+9) { animation-delay: .42s; }

        .polaroid {
            transition: transform .35s cubic-bezier(.22,.61,.36,1), box-shadow .35s ease;
        }
        .polaroid:hover {
            transform: translateY(-6px) rotate(0deg) scale(1.015);
            box-shadow: 0 18px 32px -12px rgba(20, 17, 15, .28);
            z-index: 10;
        }

        .trip-card { transition: transform .35s cubic-bezier(.22,.61,.36,1), box-shadow .35s ease; }
        .trip-card:hover { transform: translateY(-5px); box-shadow: 0 20px 36px -16px rgba(20,17,15,.3); }

        .btn-press { transition: transform .12s ease, box-shadow .2s ease, background-color .2s ease; }
        .btn-press:active { transform: scale(.96); }

        .skeleton {
            background: linear-gradient(100deg, #ece3d3 30%, #f6efe2 50%, #ece3d3 70%);
            background-size: 800px 100%;
            animation: shimmer 1.4s infinite linear;
        }

        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,.4);
            border-top-color: #fff;
            border-radius: 999px;
            animation: spin .7s linear infinite;
        }

        .ring-pulse { animation: pulseRing 1.8s ease-out infinite; }

        .dropzone-active {
            border-color: var(--amber) !important;
            background-color: #fbeedb !important;
        }

        .fab-amber {
            background: linear-gradient(135deg, var(--amber), var(--amber-deep));
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: .001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: .001ms !important;
            }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="antialiased min-h-screen">
    {% block content %}{% endblock %}

    <!-- Toast bildirim alanı -->
    <div id="toast-container" class="fixed top-5 right-5 z-[100] flex flex-col gap-2 items-end"></div>

    <script>
        // Sayfa yenilemeleri arasında bildirim göstermek için (ör. yükleme/silme sonrası reload)
        document.addEventListener('DOMContentLoaded', () => {
            const pending = sessionStorage.getItem('pending_toast');
            if (pending) {
                sessionStorage.removeItem('pending_toast');
                try {
                    const { message, type } = JSON.parse(pending);
                    showToast(message, type);
                } catch (e) {}
            }
        });
        function queueToast(message, type = 'success') {
            sessionStorage.setItem('pending_toast', JSON.stringify({ message, type }));
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const palette = {
                success: { bg: 'bg-[var(--moss)]', icon: 'fa-circle-check' },
                error:   { bg: 'bg-red-700',        icon: 'fa-circle-exclamation' },
                info:    { bg: 'bg-[var(--ink)]',   icon: 'fa-circle-info' },
            }[type] || {};
            toast.className = `anim-slide ${palette.bg} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 text-sm font-medium max-w-xs`;
            toast.innerHTML = `<i class="fa-solid ${palette.icon}"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.transition = 'opacity .3s ease, transform .3s ease';
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(16px)';
                setTimeout(() => toast.remove(), 300);
            }, 3200);
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
