<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vault | Ortak Anılar{% endblock %}</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#2c5cf6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vault">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <link rel="icon" href="/static/icons/icon-192.png">
    <script>
        (function () {
            try {
                var t = localStorage.getItem('vault-theme');
                if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    document.documentElement.classList.add('dark');
                }
            } catch (e) {}
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #131316;
            --paper: #eeeeec;
            --amber: #2c5cf6;
            --amber-deep: #1d3fc4;
            --moss: #1f8a5f;
            --line: #dcdcda;
            --surface: #ffffff;
        }
        html.dark {
            --ink: #f1f1f0;
            --paper: #131316;
            --amber: #5b82ff;
            --amber-deep: #7c9bff;
            --moss: #34b87a;
            --line: #2c2c30;
            --surface: #1c1c20;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--paper); color: var(--ink); transition: background-color .2s ease, color .2s ease; }
        .font-display { font-family: 'Inter', sans-serif; letter-spacing: -0.03em; font-weight: 700; }
        .font-mono { font-family: 'JetBrains Mono', monospace; letter-spacing: -0.01em; }

        /* Karanlık mod: ortak Tailwind yardımcı sınıflarını ezerek tüm sayfalara uygula */
        html.dark .bg-white,
        html.dark .bg-white\/90,
        html.dark .bg-white\/95,
        html.dark .bg-white\/60,
        html.dark .bg-white\/40 { background-color: var(--surface) !important; }
        html.dark .bg-stone-50,
        html.dark .bg-stone-100,
        html.dark .bg-stone-200 { background-color: #232328 !important; }
        html.dark .border-stone-200,
        html.dark .border-stone-300 { border-color: var(--line) !important; }
        html.dark .text-stone-300 { color: #6f6f76 !important; }
        html.dark .text-stone-400 { color: #87878e !important; }
        html.dark .text-stone-500 { color: #9c9ca3 !important; }
        html.dark .text-stone-600 { color: #b4b4ba !important; }
        html.dark .text-stone-700 { color: #d6d6da !important; }
        html.dark .text-stone-800 { color: #ececee !important; }
        html.dark .bg-\[var\(--ink\)\] { background-color: #1c1c20 !important; }
        html.dark input,
        html.dark textarea { background-color: var(--surface); color: var(--ink); }
        html.dark ::placeholder { color: #6f6f76; }
        html.dark .shadow-sm, html.dark .shadow-md, html.dark .shadow-lg, html.dark .shadow-xl {
            box-shadow: 0 8px 20px -10px rgba(0,0,0,.5) !important;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #d4d4d3; border-radius: 999px; }
        ::-webkit-scrollbar-track { background: transparent; }

        .theme-toggle {
            position: fixed; bottom: 18px; right: 18px; z-index: 90;
            height: 42px; width: 42px; border-radius: 999px;
            background: var(--surface); border: 1px solid var(--line);
            box-shadow: 0 6px 16px -8px rgba(0,0,0,.25);
            display: flex; align-items: center; justify-content: center;
            color: var(--ink); cursor: pointer; transition: transform .15s ease, background-color .2s ease;
        }
        .theme-toggle:active { transform: scale(.94); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(.97); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(16px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes pinDrop {
            0% { opacity: 0; transform: translateY(-6px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes shimmer {
            0% { background-position: -400px 0; }
            100% { background-position: 400px 0; }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .anim-fade-up { animation: fadeInUp .4s cubic-bezier(.22,.61,.36,1) both; }
        .anim-fade { animation: fadeIn .3s ease both; }
        .anim-scale { animation: scaleIn .2s cubic-bezier(.22,.61,.36,1) both; }
        .anim-slide { animation: slideInRight .3s cubic-bezier(.22,.61,.36,1) both; }
        .anim-pin { animation: pinDrop .35s cubic-bezier(.22,.61,.36,1) both; }

        .stagger > * { opacity: 0; animation: fadeInUp .4s cubic-bezier(.22,.61,.36,1) both; }
        .stagger > *:nth-child(1) { animation-delay: .02s; }
        .stagger > *:nth-child(2) { animation-delay: .05s; }
        .stagger > *:nth-child(3) { animation-delay: .08s; }
        .stagger > *:nth-child(4) { animation-delay: .11s; }
        .stagger > *:nth-child(5) { animation-delay: .14s; }
        .stagger > *:nth-child(6) { animation-delay: .17s; }
        .stagger > *:nth-child(7) { animation-delay: .20s; }
        .stagger > *:nth-child(8) { animation-delay: .23s; }
        .stagger > *:nth-child(n+9) { animation-delay: .26s; }

        .polaroid {
            transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease;
        }
        .polaroid:hover {
            transform: translateY(-3px);
            border-color: #d4d4d3;
            box-shadow: 0 8px 20px -10px rgba(19, 19, 22, .18);
            z-index: 10;
        }

        .trip-card { transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease; }
        .trip-card:hover { transform: translateY(-3px); border-color: #d4d4d3; box-shadow: 0 12px 24px -14px rgba(19,19,22,.2); }

        .btn-press { transition: transform .1s ease, box-shadow .2s ease, background-color .2s ease; }
        .btn-press:active { transform: scale(.97); }

        .skeleton {
            background: linear-gradient(100deg, #ece9e3 30%, #f6f5f2 50%, #ece9e3 70%);
            background-size: 800px 100%;
            animation: shimmer 1.4s infinite linear;
        }

        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,.4);
            border-top-color: #fff;
            border-radius: 999px;
            animation: spin .7s linear infinite;
        }

        .dropzone-active {
            border-color: var(--amber) !important;
            background-color: #eef2ff !important;
        }

        .fab-amber {
            background: var(--amber);
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: .001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: .001ms !important;
            }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="antialiased min-h-screen">
    <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()" title="Görünümü değiştir">
        <i id="theme-toggle-icon" class="fa-solid fa-moon text-sm"></i>
    </button>

    {% block content %}{% endblock %}

    <!-- Pull-to-refresh göstergesi (standalone PWA'da native pull-to-refresh yok) -->
    <div id="ptr-indicator" style="position:fixed; top:0; left:0; right:0; display:flex; justify-content:center; align-items:flex-end; height:0; overflow:hidden; z-index:200; transition:height .15s ease; pointer-events:none;">
        <div style="padding:10px 0;">
            <i id="ptr-icon" class="fa-solid fa-arrow-down" style="color:var(--amber-deep); font-size:18px; transition:transform .15s ease;"></i>
        </div>
    </div>

    <!-- Toast bildirim alanı -->
    <div id="toast-container" class="fixed top-5 right-5 z-[100] flex flex-col gap-2 items-end"></div>

    <script>
        function setThemeIcon() {
            const icon = document.getElementById('theme-toggle-icon');
            const isDark = document.documentElement.classList.contains('dark');
            icon.className = isDark ? 'fa-solid fa-sun text-sm' : 'fa-solid fa-moon text-sm';
        }
        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            try { localStorage.setItem('vault-theme', html.classList.contains('dark') ? 'dark' : 'light'); } catch (e) {}
            setThemeIcon();
        }
        setThemeIcon();

        // --- Pull-to-refresh (standalone PWA'da native destek yok, elle uyguluyoruz) ---
        (function () {
            const indicator = document.getElementById('ptr-indicator');
            const icon = document.getElementById('ptr-icon');
            const THRESHOLD = 70;
            let startY = 0;
            let pulling = false;
            let refreshing = false;

            document.addEventListener('touchstart', (e) => {
                if (window.scrollY === 0 && !refreshing) {
                    startY = e.touches[0].clientY;
                    pulling = true;
                } else {
                    pulling = false;
                }
            }, { passive: true });

            document.addEventListener('touchmove', (e) => {
                if (!pulling || refreshing) return;
                const diff = e.touches[0].clientY - startY;
                if (diff > 0 && window.scrollY === 0) {
                    const height = Math.min(diff * 0.5, 90);
                    indicator.style.height = height + 'px';
                    icon.style.transform = diff * 0.5 >= THRESHOLD ? 'rotate(180deg)' : 'rotate(0deg)';
                }
            }, { passive: true });

            document.addEventListener('touchend', () => {
                if (!pulling || refreshing) return;
                pulling = false;
                const currentHeight = parseInt(indicator.style.height || '0', 10);
                if (currentHeight >= THRESHOLD) {
                    refreshing = true;
                    indicator.style.height = '50px';
                    icon.className = 'fa-solid fa-spinner fa-spin';
                    window.location.reload();
                } else {
                    indicator.style.height = '0px';
                }
            }, { passive: true });
        })();
        document.addEventListener('DOMContentLoaded', () => {
            const pending = sessionStorage.getItem('pending_toast');
            if (pending) {
                sessionStorage.removeItem('pending_toast');
                try {
                    const { message, type } = JSON.parse(pending);
                    showToast(message, type);
                } catch (e) {}
            }
        });
        function queueToast(message, type = 'success') {
            sessionStorage.setItem('pending_toast', JSON.stringify({ message, type }));
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const palette = {
                success: { bg: 'bg-[var(--moss)]', icon: 'fa-circle-check' },
                error:   { bg: 'bg-red-700',        icon: 'fa-circle-exclamation' },
                info:    { bg: 'bg-stone-900',      icon: 'fa-circle-info' },
            }[type] || {};
            toast.className = `anim-slide ${palette.bg} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 text-sm font-medium max-w-xs`;
            toast.innerHTML = `<i class="fa-solid ${palette.icon}"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.transition = 'opacity .3s ease, transform .3s ease';
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(16px)';
                setTimeout(() => toast.remove(), 300);
            }, 3200);
        }

        // --- PWA / Push bildirimleri ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js', { scope: '/' }).catch((e) => {
                console.error('SW register error:', e);
            });
        }

        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - (base64String.length % 4)) % 4);
            const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
            const rawData = atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; i++) outputArray[i] = rawData.charCodeAt(i);
            return outputArray;
        }

        function pushSupported() {
            return 'serviceWorker' in navigator && 'PushManager' in window && 'Notification' in window;
        }

        async function isPushSubscribed() {
            if (!pushSupported()) return false;
            try {
                const reg = await navigator.serviceWorker.ready;
                const sub = await reg.pushManager.getSubscription();
                return !!sub;
            } catch (e) {
                return false;
            }
        }

        async function enablePushNotifications() {
            if (!pushSupported()) {
                showToast('Bu tarayıcı bildirimleri desteklemiyor. iPhone\'da önce Vault\'u ana ekrana eklemen gerekiyor.', 'error');
                return false;
            }
            try {
                showToast('1) İzin isteniyor...', 'info');
                const permission = await Notification.requestPermission();
                showToast('2) İzin sonucu: ' + permission, 'info');
                if (permission !== 'granted') {
                    showToast('Bildirim izni verilmedi', 'error');
                    return false;
                }
                showToast('3) Public key isteniyor...', 'info');
                const keyRes = await fetch('/api/push/public-key');
                const keyData = await keyRes.json();
                showToast('4) Key geldi: ' + (keyData.publicKey ? keyData.publicKey.slice(0, 12) + '...' : 'YOK'), 'info');
                if (!keyData.publicKey) {
                    showToast('Bildirim sistemi sunucuda henüz ayarlanmamış', 'error');
                    return false;
                }
                showToast('5) Service worker bekleniyor...', 'info');
                const reg = await navigator.serviceWorker.ready;
                showToast('6) SW hazır, abonelik kontrol ediliyor...', 'info');
                let sub = await reg.pushManager.getSubscription();
                if (!sub) {
                    showToast('7) Yeni abonelik oluşturuluyor...', 'info');
                    sub = await reg.pushManager.subscribe({
                        userVisibleOnly: true,
                        applicationServerKey: urlBase64ToUint8Array(keyData.publicKey),
                    });
                    showToast('8) Abonelik oluştu', 'info');
                } else {
                    showToast('7b) Zaten abone (mevcut sub bulundu)', 'info');
                }
                showToast('9) Sunucuya kaydediliyor...', 'info');
                const subRes = await fetch('/api/push/subscribe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(sub),
                });
                showToast('10) Sunucu cevabı: ' + subRes.status, subRes.ok ? 'success' : 'error');
                showToast('Bildirimler açıldı', 'success');
                return true;
            } catch (err) {
                console.error('Push subscribe error:', err);
                showToast('HATA: ' + (err.name || '') + ' - ' + (err.message || err), 'error');
                return false;
            }
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
